<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetClinic — Cambiar Contraseña</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f0fdf4; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { background: #fff; border-radius: 1.5rem; box-shadow: 0 20px 60px rgba(13,59,46,.12);
            padding: 2.5rem; width: 100%; max-width: 440px; }
    .vinput { width: 100%; border: 1.5px solid #e2e8f0; border-radius: .85rem;
              padding: .75rem 1rem; font-size: .9rem; font-family: inherit;
              transition: border-color .15s; outline: none; }
    .vinput:focus { border-color: #10b981; }
    .vlabel { font-size: .78rem; font-weight: 700; color: #374151;
              display: block; margin-bottom: .4rem; }
    .vbtn { width: 100%; padding: .85rem; border: none; border-radius: .85rem;
            font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
            transition: opacity .15s; }
    .vbtn:hover { opacity: .9; }
    .req { font-size: .72rem; color: #6b7280; margin-top: .25rem; }
    .error { background: #fff1f2; border: 1px solid #fecdd3; color: #be123c;
             border-radius: .75rem; padding: .75rem 1rem; font-size: .82rem;
             margin-bottom: 1rem; display: none; }
    .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d;
               border-radius: .75rem; padding: .75rem 1rem; font-size: .82rem;
               margin-bottom: 1rem; display: none; }
    .strength { height: 4px; border-radius: 2px; margin-top: .4rem; transition: all .3s; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <div style="text-align:center;margin-bottom:2rem">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#166534,#15803d);
        border-radius:1rem;display:flex;align-items:center;justify-content:center;
        font-size:1.8rem;margin:0 auto 1rem">🔐</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#1a2e28">
        Cambiar contraseña
      </h1>
      <p id="subtitulo" style="color:#6b7280;font-size:.85rem;margin-top:.4rem">
        Por seguridad debes establecer una nueva contraseña.
      </p>
    </div>

    <!-- Info usuario -->
    <div id="user-info" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:.85rem;
      padding:.75rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem">
      <span style="font-size:1.4rem">👤</span>
      <div>
        <p style="font-weight:700;font-size:.88rem" id="user-nombre">—</p>
        <p style="font-size:.72rem;color:#6b7280" id="user-email">—</p>
      </div>
    </div>

    <div id="error-box" class="error"></div>
    <div id="success-box" class="success"></div>

    <!-- Formulario primer login (sin password actual) -->
    <div id="form-primer-login">
      <div style="margin-bottom:1rem">
        <label class="vlabel">Nueva contraseña *</label>
        <input id="pwd-nuevo-1" type="password" class="vinput" placeholder="Mínimo 8 caracteres"
          oninput="checkStrength(this.value)"/>
        <div id="strength-bar" class="strength" style="background:#e5e7eb"></div>
        <p id="strength-label" class="req">Escribe tu nueva contraseña</p>
      </div>
      <div style="margin-bottom:1.5rem">
        <label class="vlabel">Confirmar contraseña *</label>
        <input id="pwd-confirm-1" type="password" class="vinput" placeholder="Repite la contraseña"/>
      </div>
      <button onclick="cambiarPrimerLogin()" class="vbtn"
        style="background:linear-gradient(135deg,#166534,#15803d);color:#fff">
        ✅ Establecer contraseña y entrar
      </button>
    </div>

    <!-- Formulario cambio desde perfil (con password actual) -->
    <div id="form-desde-perfil" style="display:none">
      <div style="margin-bottom:1rem">
        <label class="vlabel">Contraseña actual *</label>
        <input id="pwd-actual" type="password" class="vinput" placeholder="Tu contraseña actual"/>
      </div>
      <div style="margin-bottom:1rem">
        <label class="vlabel">Nueva contraseña *</label>
        <input id="pwd-nuevo-2" type="password" class="vinput" placeholder="Mínimo 8 caracteres"
          oninput="checkStrength(this.value)"/>
        <div id="strength-bar-2" class="strength" style="background:#e5e7eb"></div>
        <p id="strength-label-2" class="req">Escribe tu nueva contraseña</p>
      </div>
      <div style="margin-bottom:1.5rem">
        <label class="vlabel">Confirmar nueva contraseña *</label>
        <input id="pwd-confirm-2" type="password" class="vinput" placeholder="Repite la contraseña"/>
      </div>
      <button onclick="cambiarDesdePerfil()" class="vbtn"
        style="background:linear-gradient(135deg,#166534,#15803d);color:#fff;margin-bottom:.75rem">
        💾 Actualizar contraseña
      </button>
      <button onclick="window.history.back()" class="vbtn"
        style="background:#f8faf8;color:#374151;border:1.5px solid #e2e8f0">
        Cancelar
      </button>
    </div>

    <p style="text-align:center;font-size:.72rem;color:#9ca3af;margin-top:1.5rem">
      🔒 Tu contraseña viaja encriptada y nunca se almacena en texto plano.
    </p>
  </div>

  <script>
    const _isLocal = window.location.hostname === 'localhost' || window.location.hostname.endsWith('.test');
    const _base    = window.location.hostname.split('.').slice(-2).join('.');
    const API      = _isLocal ? 'http://localhost:4000/api/v1' : `https://api.${_base}/api/v1`;
    const HOST     = window.location.hostname;

    const tempToken  = localStorage.getItem('vet_temp_token');
    const tempUser   = JSON.parse(localStorage.getItem('vet_temp_user') || 'null');
    const accessToken = localStorage.getItem('vet_access');

    // Determinar modo
    const esPrimerLogin = !!tempToken;
    const esDesdePerfil = !esPrimerLogin && !!accessToken;

    if (!esPrimerLogin && !esDesdePerfil) {
      window.location.href = 'login.html';
    }

    // Mostrar info usuario
    const user = tempUser || JSON.parse(localStorage.getItem('vet_user') || 'null');
    if (user) {
      document.getElementById('user-nombre').textContent = user.nombre;
      document.getElementById('user-email').textContent  = user.email;
    }

    // Mostrar formulario correcto
    if (esDesdePerfil) {
      document.getElementById('form-primer-login').style.display = 'none';
      document.getElementById('form-desde-perfil').style.display = 'block';
      document.getElementById('subtitulo').textContent = 'Actualiza tu contraseña cuando quieras.';
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-box').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-box');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-box').style.display = 'none';
    }

    function checkStrength(pwd) {
      const bar    = document.getElementById('strength-bar') || document.getElementById('strength-bar-2');
      const label  = document.getElementById('strength-label') || document.getElementById('strength-label-2');
      let score = 0;
      if (pwd.length >= 8)  score++;
      if (pwd.length >= 12) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const levels = [
        { color: '#ef4444', label: 'Muy débil',  width: '20%' },
        { color: '#f97316', label: 'Débil',       width: '40%' },
        { color: '#eab308', label: 'Regular',     width: '60%' },
        { color: '#22c55e', label: 'Fuerte',      width: '80%' },
        { color: '#15803d', label: 'Muy fuerte',  width: '100%' },
      ];
      const lvl = levels[Math.min(score, 4)];
      if (bar)   { bar.style.background = lvl.color; bar.style.width = lvl.width; }
      if (label) label.textContent = lvl.label;
    }

    async function cambiarPrimerLogin() {
      const pwd     = document.getElementById('pwd-nuevo-1').value;
      const confirm = document.getElementById('pwd-confirm-1').value;

      if (!pwd || pwd.length < 8) { showError('La contraseña debe tener al menos 8 caracteres.'); return; }
      if (pwd !== confirm)         { showError('Las contraseñas no coinciden.'); return; }

      try {
        const res  = await fetch(`${API}/auth/change-password`, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Tenant-Host': HOST },
          body   : JSON.stringify({ temp_token: tempToken, password_nuevo: pwd, password_confirm: confirm }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Error al cambiar contraseña.'); return; }

        // Limpiar temp y guardar tokens reales
        localStorage.removeItem('vet_temp_token');
        localStorage.removeItem('vet_temp_user');
        localStorage.setItem('vet_access',  data.data.accessToken);
        localStorage.setItem('vet_refresh', data.data.refreshToken);
        localStorage.setItem('vet_user',    JSON.stringify(data.data.user));

        showSuccess('✅ Contraseña actualizada. Entrando al sistema…');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch { showError('Error de conexión. Intenta de nuevo.'); }
    }

    async function cambiarDesdePerfil() {
      const actual  = document.getElementById('pwd-actual').value;
      const nuevo   = document.getElementById('pwd-nuevo-2').value;
      const confirm = document.getElementById('pwd-confirm-2').value;

      if (!actual)               { showError('Ingresa tu contraseña actual.'); return; }
      if (!nuevo || nuevo.length < 8) { showError('La nueva contraseña debe tener al menos 8 caracteres.'); return; }
      if (nuevo !== confirm)     { showError('Las contraseñas no coinciden.'); return; }

      try {
        const res  = await fetch(`${API}/auth/change-password`, {
          method : 'POST',
          headers: {
            'Content-Type'  : 'application/json',
            'X-Tenant-Host' : HOST,
            'Authorization' : `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password_actual: actual, password_nuevo: nuevo, password_confirm: confirm }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Error al cambiar contraseña.'); return; }

        showSuccess('✅ Contraseña actualizada correctamente.');
        setTimeout(() => window.history.back(), 1500);
      } catch { showError('Error de conexión. Intenta de nuevo.'); }
    }

    // Enter para enviar
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (esPrimerLogin) cambiarPrimerLogin();
      else               cambiarDesdePerfil();
    });
  </script>
</body>
</html>
