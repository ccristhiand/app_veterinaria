<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetClinic SaaS — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .card{background:#1e293b;border:1px solid #334155;border-radius:1.5rem;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
    input{background:#0f172a;border:1.5px solid #334155;border-radius:.75rem;padding:.75rem 1rem;color:#e2e8f0;font-size:.88rem;font-family:inherit;outline:none;width:100%;transition:border-color .15s}
    input:focus{border-color:#6366f1}
    label{display:block;font-size:.72rem;font-weight:600;color:#64748b;margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.08em}
    .btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:.85rem;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-top:.5rem}
    .btn:hover{opacity:.88}
    .error{color:#f87171;font-size:.78rem;text-align:center;margin-top:.5rem;display:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1rem">🐾</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#f1f5f9">Panel SaaS</h1>
      <p style="font-size:.82rem;color:#64748b;margin-top:.3rem">Administración de clínicas VetClinic</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div>
        <label>Email</label>
        <input id="email" type="email" placeholder="admin@vetclinic.com"/>
      </div>
      <div>
        <label>Contraseña</label>
        <input id="pass" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <button class="btn" onclick="login()" id="btn-login">Ingresar al panel</button>
      <p id="error" class="error"></p>
    </div>
    <p style="text-align:center;font-size:.72rem;color:#334155;margin-top:2rem">
      🔒 Acceso restringido — Solo personal autorizado
    </p>
  </div>

  <script src="admin_shared.js"></script>
  <script>
    // Si ya está logueado, redirigir
    if (isLoggedIn()) window.location.href = 'index.html';

    async function login() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value;
      const btn   = document.getElementById('btn-login');
      const err   = document.getElementById('error');

      if (!email || !pass) { err.textContent = 'Completa todos los campos.'; err.style.display='block'; return; }

      btn.textContent = 'Ingresando…';
      btn.disabled    = true;
      err.style.display = 'none';

      try {
        const res  = await fetch(`${ADMIN_API}/login`, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body   : JSON.stringify({ email, password: pass }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.message || 'Credenciales inválidas.'; err.style.display='block'; return; }
        localStorage.setItem('admin_token', data.data?.token || data.token);
        localStorage.setItem('admin_user',  JSON.stringify({ nombre: data.data?.nombre || data.nombre, rol: data.data?.rol || data.rol }));
        window.location.href = 'index.html';
      } catch {
        err.textContent = 'Error de conexión.';
        err.style.display = 'block';
      } finally {
        btn.textContent = 'Ingresar al panel';
        btn.disabled    = false;
      }
    }
  </script>
</body>
</html>
